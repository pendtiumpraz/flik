; FLiK PHP Configuration for Video Uploads
; Add these settings to your php.ini or .user.ini

; Maximum upload file size (500MB for video uploads)
upload_max_filesize = 512M

; Maximum POST data size
post_max_size = 520M

; Maximum execution time for uploads
max_execution_time = 600

; Maximum input time
max_input_time = 600

; Memory limit
memory_limit = 512M
