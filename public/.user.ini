; FLiK PHP Configuration for Video Uploads
; Add these settings to your php.ini or .user.ini
;
; NOTE: .user.ini is only read by PHP-FPM / CGI SAPI. The built-in
; `php artisan serve` dev server does NOT read it — for local dev you must
; set the same values in the php.ini that `php --ini` reports.

; Maximum upload file size. Set above the app's 5GB validator cap
; (FileUploadValidator::validateVideo) so PHP is never the bottleneck.
; A 2GB film fits comfortably; chunked uploads (>50MB) only send ~5MB per
; request so they don't depend on this — but single-shot uploads do.
upload_max_filesize = 5120M

; Maximum POST data size (must exceed upload_max_filesize + form overhead)
post_max_size = 5200M

; Maximum execution time. Web requests stay short now that transcoding is
; dispatched to the async `transcoding` queue (QUEUE_CONNECTION=database);
; the heavy ffmpeg work runs in `php artisan queue:work`, not the web thread.
max_execution_time = 600

; Maximum input time (time to receive request body)
max_input_time = 600

; Memory limit. Uploads stream to disk (fopen + stream_copy_to_stream), so
; this does NOT need to scale with file size.
memory_limit = 512M
