# Dependabot configuration — keeps PHP, JS, and GitHub Actions dependencies fresh.
# Schedule fires Monday 06:00 Asia/Jakarta so PRs land in EU/US working hours.
# Grouping reduces PR noise — Laravel-family bumps land together, dev-only bumps land together.
version: 2
updates:
  - package-ecosystem: 'composer'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:00'
      timezone: 'Asia/Jakarta'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'php'
    groups:
      laravel:
        patterns:
          - 'laravel/*'
          - 'illuminate/*'
      dev:
        dependency-type: 'development'

  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:00'
      timezone: 'Asia/Jakarta'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'js'
    groups:
      dev:
        dependency-type: 'development'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
    labels:
      - 'dependencies'
      - 'ci'
