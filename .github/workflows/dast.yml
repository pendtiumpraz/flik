name: DAST (OWASP ZAP)

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target URL to scan'
        required: true
        default: 'https://staging.flik.example.com'
  schedule:
    - cron: '0 8 * * 1'  # Weekly Monday 8am UTC

jobs:
  zap-baseline:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: '${{ inputs.target_url || vars.STAGING_URL || ''https://staging.flik.example.com'' }}'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a -j -m 5 -T 10'
          allow_issue_writing: true

  zap-full:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: '${{ inputs.target_url }}'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'
