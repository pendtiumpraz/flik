name: Deploy to VM

# Auto-deploy ke Compute Engine VM tiap push ke main.
#
# Prasyarat (set di repo Settings → Secrets and variables → Actions):
#   VM_HOST    : IP eksternal VM (atau domain)
#   VM_USER    : user SSH di VM (mis. 'deploy' atau user GCE-mu)
#   VM_SSH_KEY : PRIVATE key SSH (PEM) yang public-nya ada di ~/.ssh/authorized_keys VM
#
# User SSH butuh passwordless sudo (untuk `sudo -u www-data ...` + `sudo bash deploy.sh`
# + `systemctl reload`). Contoh di VM:
#   echo '<VM_USER> ALL=(ALL) NOPASSWD:ALL' | sudo tee /etc/sudoers.d/flik-deploy
#
# Alternatif lebih aman (tanpa static key): google-github-actions/auth + Workload
# Identity Federation + `gcloud compute ssh`. Lihat komentar di bawah job.

on:
  push:
    branches: [main, staging]
  workflow_dispatch: {}

# Per-branch: prod (main) & staging jalan independen, tak dobel di branch sama.
concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # main → environment 'production'; selain itu (staging) → 'staging'.
    # Secret (VM_HOST/VM_USER/VM_SSH_KEY/DISCORD_WEBHOOK) di-scope PER-ENVIRONMENT.
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    steps:
      - name: Validate SSH key
        env:
          KEY: ${{ secrets.VM_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          # VM_SSH_KEY boleh raw PEM (ada 'BEGIN') ATAU base64 satu-baris (anti mangle).
          if printf '%s' "$KEY" | grep -q 'BEGIN'; then
            printf '%s\n' "$KEY" > ~/.ssh/id_deploy
          else
            printf '%s' "$KEY" | base64 -d > ~/.ssh/id_deploy 2>/dev/null
          fi
          chmod 600 ~/.ssh/id_deploy
          ssh-keygen -y -f ~/.ssh/id_deploy >/dev/null 2>&1 \
            && echo "✅ SSH key valid" \
            || { echo "❌ VM_SSH_KEY TIDAK VALID. Isi secret dgn output: base64 -w0 ~/deploy_key  (satu baris)"; exit 1; }

      - name: Deploy over SSH
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USER: ${{ secrets.VM_USER }}
          TARGET_REF: ${{ github.ref_name }}
        run: |
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=20 \
            "$VM_USER@$VM_HOST" "
              set -e
              cd /var/www/flik
              PREV=\$(sudo -u www-data env HOME=/var/www/flik git rev-parse HEAD)
              echo \"branch=$TARGET_REF prev=\$PREV\"
              sudo -u www-data env HOME=/var/www/flik git fetch --all --prune
              sudo -u www-data env HOME=/var/www/flik git reset --hard origin/$TARGET_REF
              sudo PREV=\$PREV TARGET_REF='$TARGET_REF' bash /var/www/flik/scripts/ci-deploy.sh
            "

      - name: Notify Discord — sukses
        if: success()
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          MSG: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ENVIRONMENT: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
        run: |
          [ -n "$WEBHOOK" ] || { echo "DISCORD_WEBHOOK kosong — skip notif"; exit 0; }
          SHORT="${SHA:0:7}"; MSG="${MSG:-manual/dispatch}"; MSG="${MSG:0:900}"
          jq -n --arg t "✅ Deploy sukses [$ENVIRONMENT]" --arg u "$RUN_URL" --arg repo "$REPO" --arg ref "$REF" --arg sha "$SHORT" --arg actor "$ACTOR" --arg msg "$MSG" '{embeds:[{title:$t,url:$u,color:3066993,fields:[{name:"Repo",value:$repo,inline:true},{name:"Branch",value:$ref,inline:true},{name:"Commit",value:$sha,inline:true},{name:"Oleh",value:$actor,inline:true},{name:"Pesan",value:$msg}]}]}' | curl -sf -H "Content-Type: application/json" -d @- "$WEBHOOK" >/dev/null || echo "notif gagal"

      - name: Notify Discord — gagal
        if: failure()
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          MSG: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ENVIRONMENT: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
        run: |
          [ -n "$WEBHOOK" ] || { echo "DISCORD_WEBHOOK kosong — skip notif"; exit 0; }
          SHORT="${SHA:0:7}"; MSG="${MSG:-manual/dispatch}"; MSG="${MSG:0:900}"
          jq -n --arg t "❌ Deploy GAGAL [$ENVIRONMENT] (rollback)" --arg u "$RUN_URL" --arg repo "$REPO" --arg ref "$REF" --arg sha "$SHORT" --arg actor "$ACTOR" --arg msg "$MSG" '{embeds:[{title:$t,url:$u,color:15158332,description:"Build/migrate atau health-check gagal — site di-rollback ke commit sebelumnya.",fields:[{name:"Repo",value:$repo,inline:true},{name:"Branch",value:$ref,inline:true},{name:"Commit",value:$sha,inline:true},{name:"Oleh",value:$actor,inline:true},{name:"Pesan",value:$msg}]}]}' | curl -sf -H "Content-Type: application/json" -d @- "$WEBHOOK" >/dev/null || echo "notif gagal"

